<!doctype html>
<html lang="es">
 <head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Finbalo — Estudio de desarrollo de software en Guatemala. Creamos aplicaciones web, móviles, de escritorio y más con calidad profesional." />
  <meta name="keywords" content="desarrollo de software, Guatemala, aplicaciones web, testing, QA, React, startup, Finbalo" />
  <meta property="og:title" content="Finbalo — Software Studio" />
  <meta property="og:description" content="Construimos el software que tu negocio necesita. Web, móvil, escritorio y más." />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#0B0F14" />

  <script>
    (() => {
      const saved = localStorage.getItem('finbalo-theme');
      const theme = saved || 'dark';
      const root = document.documentElement;

      root.setAttribute('data-theme', theme);
      root.style.backgroundColor = theme === 'dark' ? '#0B0F14' : '#F8F6F2';
      root.style.colorScheme = theme;
    })();
  </script>

  <style>
    html, body, #root {
      margin: 0;
      min-height: 100%;
      background: #0B0F14;
    }

    html[data-theme="light"],
    html[data-theme="light"] body,
    html[data-theme="light"] #root {
      background: #F8F6F2;
    }

    body {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&display=block" rel="stylesheet" />

  <title>Finbalo — Software Studio</title>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
